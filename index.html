<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>황제 폐하 전역 카운트</title>
    
    <!-- 구글 Noto Sans KR 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: #ffffff;
            display: flex;
            flex-direction: column; /* 세로로 정렬 */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-variant-numeric: tabular-nums; 
        }

        /* 최상단 전체를 감싸는 상자 (가로 정렬) */
        .top-profile-container {
            display: flex;
            align-items: center; /* 세로 기준 중앙 정렬 */
            gap: 20px;           /* 이미지와 오른쪽 내용 사이의 간격 */
            margin-bottom: 25px; /* 시계 상자와의 간격 */
        }

        /* 이미지 스타일 */
        .top-image {
            width: 250px;         /* 나란히 배치하기 위해 크기 축소 */
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* 오른쪽 텍스트와 버튼을 담는 상자 (세로 정렬) */
        .profile-audio-box {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* 왼쪽 정렬 */
            gap: 8px;                /* 글자와 버튼 사이 간격 */
        }

        /* 버튼 위 텍스트 스타일 */
        .audio-text {
            font-size: 1rem;
            font-weight: 500;
            color: #b0bec5;
            letter-spacing: 0.5px;
        }

        /* 커스텀 오디오 버튼 스타일 */
        .custom-audio-btn {
            background-color: #243b55;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 버튼에 마우스 올렸을 때 효과 */
        .custom-audio-btn:hover {
            background-color: #ffeb3b;
            color: #141e30;
            border-color: #ffeb3b;
        }

        .clock-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            min-width: 380px;
            margin-bottom: 30px; /* 유튜브 영상과의 간격 */
        }

        .date-display {
            font-size: 1.3rem;
            font-weight: 300;
            color: #b0bec5;
            margin-bottom: 5px;
        }

        .time-display {
            font-size: 4rem;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
        }

        /* 전역일 영역 스타일 */
        .dday-container {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 25px;
        }

        .dday-title {
            font-size: 1.1rem;
            font-weight: 300;
            color: #81d4fa;
            margin-bottom: 8px;
        }

        .dday-count {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.4);
            margin-bottom: 12px;
        }

        /* 상세 카운트다운 스타일 */
        .detail-countdown {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 15px;
            border-radius: 8px;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .highlight {
            color: #ff7675;
            font-weight: 700;
        }

        /* 유튜브 플레이어 박스 스타일 */
        .video-container {
            width: 100%;
            max-width: 480px; /* 영상 최대 너비 */
            aspect-ratio: 16 / 9; /* 16:9 비율 유지 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 영상 위 텍스트 스타일 */
        .video-title {
            font-size: 1.5rem;
            font-weight: 700;
            
            background: linear-gradient(to right, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            
            -webkit-background-clip: text; 
            background-clip: text;         
            
            -webkit-text-fill-color: transparent;
            
            background-size: 200% auto;
            animation: rainbow-slide 0.5s linear infinite;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2); 
        }

        /* [추가] 무지개 그라데이션을 움직이게 하는 애니메이션 정의 */
        @keyframes rainbow-slide {
            0% {
                /* 애니메이션 시작 시 배경 위치 */
                background-position: 0% 50%;
            }
            100% {
                /* 애니메이션 끝날 때 배경 위치 (100% 이동) */
                background-position: -200% 50%;
            }
        }
        /* 스마트폰(모바일) 화면을 위한 맞춤 스타일 조정 */
        @media (max-width: 480px) {
            body {
                padding: 10px; /* 스마트폰 외곽 여백 축소 */
            }
            
            .clock-container {
                padding: 25px 20px; /* 시계 상자 안쪽 여백 축소 */
                min-width: 90%;     /* 화면 양옆을 꽉 채우도록 설정 */
            }

            .time-display {
                font-size: 2.8rem;  /* 기존 4rem에서 모바일용 크기로 축소 */
            }

            .dday-count {
                font-size: 1.8rem;  /* 디데이 글씨 축소 */
            }

            .detail-countdown {
                font-size: 0.95rem; /* 상세 시간 글씨 축소 */
                padding: 10px 8px;
            }

            .video-title {
                font-size: 1.2rem;  /* 무지개 텍스트 크기 축소 */
            }
        }
    </style>
</head>
<body>
    <div class="top-profile-container">
        <img src="goodgun.jpg" alt="상단 이미지" class="top-image">

        <div class="profile-audio-box">
            <div class="audio-text">전역 카운트와 개쩌는 추천 곡</div>
            
            <audio id="bgm" src="military_start-end.mp3" loop></audio>
            
            <button id="audio-btn" class="custom-audio-btn" onclick="toggleAudio()">▶ 누르면 재생됨</button>
        </div>
    </div>

    <div class="clock-container">

    <div class="clock-container">
    <!-- 1. 시계 & 디데이 박스 -->
    <div class="clock-container">
        <div id="date" class="date-display">0000년 00월 00일</div>
        <div id="time" class="time-display">00:00:00</div>
        
        <div class="dday-container">
            <div class="dday-title">황제 폐하의 해군 장악까지 남은 시간</div>
            <div id="dday" class="dday-count">D-000</div>
            <div id="detail" class="detail-countdown">계산 중...</div>
        </div>
    </div>
    
    
    <div class="video-title">
        해군 포상 휴가 받는 개꿀팁(찾느라 힘들었음)
    </div>
    

    <!-- 2. 가장 아래 유튜브 영상 영역 -->
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/CBUeAiZsd60?start=473" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 1. 현재 시계 화면 표시
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('date').innerText = `${year}년 ${month}월 ${day}일`;
            document.getElementById('time').innerText = `${hours}:${minutes}:${seconds}`;

            // 2. 전역일
            const targetDate = new Date("2027-12-18T10:00:00");
            const diffTime = targetDate - now;

            const ddayElement = document.getElementById('dday');
            const detailElement = document.getElementById('detail');

            if (diffTime > 0) {
                const diffDaysTotal = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                ddayElement.innerText = `D-${diffDaysTotal}`;

                let remainSec = Math.floor(diffTime / 1000);
                
                const remainDays = Math.floor(remainSec / (60 * 60 * 24));
                remainSec %= (60 * 60 * 24);

                const remainHours = Math.floor(remainSec / (60 * 60));
                remainSec %= (60 * 60);

                const remainMinutes = Math.floor(remainSec / 60);
                remainSec %= 60;

                let months = 0;
                let tempDate = new Date(now.getTime());
                
                while (true) {
                    tempDate.setMonth(tempDate.getMonth() + 1);
                    if (tempDate > targetDate) {
                        tempDate.setMonth(tempDate.getMonth() - 1);
                        break;
                    }
                    months++;
                }
                const oneDay = 1000 * 60 * 60 * 24;
                const targetDateZero = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
                const tempDateZero = new Date(tempDate.getFullYear(), tempDate.getMonth(), tempDate.getDate());
                let days = Math.floor((targetDateZero - tempDateZero) / oneDay);
                
                const h = String(remainHours).padStart(2, '0');
                const m = String(remainMinutes).padStart(2, '0');
                const s = String(remainSec).padStart(2, '0');

                detailElement.innerHTML = `<span class="highlight">${months}</span>개월 <span class="highlight">${days}</span>일 <span class="highlight">${h}</span>시 <span class="highlight">${m}</span>분 <span class="highlight">${s}</span>초`;

            } else {
                ddayElement.innerText = `D-Day`;
                detailElement.innerHTML = `🎉 경축 황제 폐하 전역 🎉`;
            }
        }

        updateClock();
        setInterval(updateClock, 1000);

        // 오디오 재생/일시정지 토글 함수
        function toggleAudio() {
            const audio = document.getElementById('bgm');
            const btn = document.getElementById('audio-btn');

            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸ 일시정지";
                btn.style.backgroundColor = "#ff7675"; // 재생 중일 땐 버튼 색상 변경
                btn.style.borderColor = "#ff7675";
            } else {
                audio.pause();
                btn.innerText = "▶ 재생";
                btn.style.backgroundColor = "#243b55"; // 정지 시 원래대로
                btn.style.borderColor = "rgba(255, 255, 255, 0.3)";
            }
        }
    </script>

</body>
</html>
